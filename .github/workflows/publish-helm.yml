on:
  push:
    branches: [main]
    paths:
      - 'dotnet/**'
      - '.github/workflows/publish-helm.yml'

permissions:
  contents: read
  id-token: write

env:
  OCI_REGISTRY: docker.io/buildcharts

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker login
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: buildcharts
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.13.3

      - name: Set up Cosign
        uses: sigstore/cosign-installer@v3

      - name: Helm push and sign
        run: |
          for dir in */*/; do
            if [ -f "$dir/Chart.yaml" ]; then
              chart_name=$(grep '^name:' "$dir/Chart.yaml" | awk '{print $2}')
              chart_version=$(grep '^version:' "$dir/Chart.yaml" | awk '{print $2}')
              chart_file="./${chart_name}-${chart_version}.tgz"

              echo ""
              echo "============================"
              echo "📦 Packaging $chart_name v$chart_version"
              echo "============================"

              helm dependency update "$dir"
              helm package "$dir" --destination .

              if [ -f "$chart_file" ]; then
                echo "Chart package size: $(du -h "$chart_file" | cut -f1)"
              fi

              echo "Pushing $chart_name to OCI registry..."
              push_output=$(helm push "./${chart_name}-${chart_version}.tgz" "oci://${OCI_REGISTRY}" 2>&1)
              echo "$push_output"

              chart_digest=$(echo "$push_output" | sed -n 's/^Digest: //p' | tail -n1)
              if [ -z "$chart_digest" ]; then
                echo "Failed to resolve digest for $chart_name after push"
                exit 1
              fi

              chart_ref="${OCI_REGISTRY}/${chart_name}@${chart_digest}"
              echo "Signing $chart_ref with cosign keyless..."
              if ! cosign_output=$(cosign sign --yes "$chart_ref" 2>&1); then
                echo "$cosign_output"
                exit 1
              fi
              echo "Signed $chart_ref"
            fi
          done
